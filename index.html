<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Moon Nest</title>

  <link rel="manifest" href="manifest.json" />

  <meta name="theme-color" content="#100b2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Moon Nest" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <style>
    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: #08091f;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: #ffffff;
      background:
        radial-gradient(circle at top, rgba(255, 226, 150, 0.18), transparent 28%),
        radial-gradient(circle at 80% 18%, rgba(181, 132, 255, 0.24), transparent 34%),
        radial-gradient(circle at 15% 85%, rgba(96, 192, 255, 0.12), transparent 38%),
        linear-gradient(160deg, #060720, #17103b, #2b1759, #071f3a);
    }

    .app {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 12px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .screen {
      display: none;
      width: 100%;
      min-height: calc(100vh - 24px);
      padding: 18px;
      border-radius: 34px;
      background:
        radial-gradient(circle at top, rgba(255, 236, 180, 0.1), transparent 30%),
        linear-gradient(180deg, rgba(81, 63, 148, 0.8), rgba(22, 20, 65, 0.94));
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow:
        0 28px 75px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
      overflow: hidden;
    }

    .screen.active {
      display: block;
    }

    .home-screen {
      text-align: center;
      position: relative;
    }

    .hero-wrap {
      position: relative;
      margin: -2px auto 10px;
      border-radius: 34px;
      overflow: hidden;
      box-shadow:
        0 18px 48px rgba(0, 0, 0, 0.34),
        0 0 48px rgba(255, 225, 130, 0.14);
    }

    .hero-art {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 34px;
      animation: softFloat 7s ease-in-out infinite;
    }

    .title {
      margin: 14px 0 4px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 46px;
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: -1px;
      color: #fff7d8;
      text-shadow:
        0 0 18px rgba(255, 245, 202, 0.35),
        0 10px 28px rgba(0, 0, 0, 0.3);
    }

    .subtitle,
    .page-text {
      margin: 10px auto 0;
      max-width: 330px;
      color: #efe9ff;
      font-size: 15.5px;
      line-height: 1.45;
      text-align: center;
    }

    .subtitle {
      margin-bottom: 16px;
      font-size: 16px;
    }

    button {
      width: 100%;
      min-height: 54px;
      margin: 9px 0;
      padding: 13px 16px;
      border: none;
      border-radius: 22px;
      font-size: 16px;
      font-weight: 900;
      color: #211650;
      background: linear-gradient(180deg, #fff8cc, #ffe46b);
      box-shadow:
        0 12px 28px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    button:active {
      transform: scale(0.98);
    }

    .main-cta {
      min-height: 62px;
      margin: 8px 0 16px;
      border-radius: 28px;
      font-size: 19px;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.2px;
    }

    .main-cta::after {
      content: "";
      position: absolute;
      top: -40%;
      left: -65%;
      width: 42%;
      height: 180%;
      background: linear-gradient(
        110deg,
        transparent,
        rgba(255, 255, 255, 0.7),
        transparent
      );
      transform: rotate(18deg);
      animation: shimmer 4s ease-in-out infinite;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 8px;
    }

    .feature-card {
      min-height: 126px;
      margin: 0;
      padding: 12px;
      border-radius: 26px;
      color: #ffffff;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 247, 190, 0.12), transparent 38%),
        linear-gradient(180deg, rgba(91, 68, 171, 0.9), rgba(35, 28, 93, 0.96));
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow:
        0 16px 34px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.16);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .feature-card img {
      width: 68px;
      height: 68px;
      object-fit: contain;
      filter: drop-shadow(0 0 18px rgba(255, 235, 150, 0.28));
    }

    .feature-card strong {
      display: block;
      color: #ffffff;
      font-size: 18px;
      text-shadow: 0 4px 14px rgba(0, 0, 0, 0.28);
    }

    .friends-preview {
      margin: 14px 0 0;
      padding: 14px;
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(112, 79, 188, 0.72), rgba(38, 30, 95, 0.9));
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.26);
    }

    .friends-preview img {
      display: block;
      width: 100%;
      border-radius: 22px;
      margin-bottom: 10px;
    }

    .friends-preview h3 {
      margin: 0;
      color: #fff7bd;
      font-size: 18px;
    }

    .friends-preview p {
      margin: 6px 0 0;
      color: #efe9ff;
      font-size: 14px;
      line-height: 1.45;
    }

    .home-links {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      margin-top: 18px;
      color: #efe9ff;
    }

    .home-links button {
      width: auto;
      min-height: auto;
      margin: 0;
      padding: 0;
      color: #efe9ff;
      background: transparent;
      box-shadow: none;
      font-size: 14px;
      text-decoration: underline;
    }

    header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 22px;
    }

    h2 {
      margin: 0;
      flex: 1;
      text-align: center;
      font-size: 24px;
      font-weight: 900;
    }

    h3 {
      margin: 0 0 10px;
      font-size: 21px;
    }

    .back {
      width: 46px;
      min-height: 46px;
      margin: 0;
      border-radius: 16px;
      font-size: 22px;
    }

    .routine-list {
      margin: 22px 0;
    }

    .routine-list label {
      display: block;
      margin: 10px 0;
      padding: 15px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.15);
      font-size: 17px;
      font-weight: 800;
    }

    input[type="checkbox"] {
      transform: scale(1.3);
      margin-right: 12px;
    }

      margin: 18px 0;
      padding: 20px;
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.15);
      border:
